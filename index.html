<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>تلميحة 💡</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800;900&family=Readex+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf9fc;--sf:#fff;--s2:#f5f3f6;--bd:#e3e2e5;--pri:#1d3557;--purp:#7e22ce;--purp2:#a855f7;--gold:#e89b10;--grn:#16a34a;--red:#dc2626;--tx:#1b1b1e;--t2:#5c5f6a;--t3:#74777f}
body{font-family:"Readex Pro",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;border-radius:14px;font-weight:700;transition:.18s;user-select:none}
.btn-purp{background:linear-gradient(135deg,#7e22ce,#6d28d9);color:#fff;padding:14px;width:100%;font-size:.95rem;box-shadow:0 4px 14px rgba(126,34,206,.3)}
.btn-purp:active{transform:scale(.97)}
.btn-purp:disabled{opacity:.4;cursor:not-allowed}
.btn-gray{background:var(--s2);color:var(--t2);padding:12px;width:100%;font-size:.88rem;border:1.5px solid var(--bd)}
.btn-gray:active{background:var(--bd)}
.btn-green{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;padding:14px;width:100%;font-size:.95rem}
.btn-red{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff;padding:10px 18px;font-size:.82rem}
.btn-sm{padding:7px 14px;font-size:.78rem}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(27,27,30,.07)}
.eyb{font-size:.6rem;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.sht{font-family:Lexend,sans-serif;font-size:1.4rem;font-weight:800;color:var(--pri);margin-bottom:14px}
.sht em{font-style:italic;color:var(--gold)}
.inp{width:100%;padding:13px 16px;border:1.5px solid var(--bd);border-radius:14px;font-size:1rem;font-family:inherit;background:var(--sf);color:var(--tx);outline:none;transition:.2s}
.inp:focus{border-color:var(--purp);box-shadow:0 0 0 3px rgba(126,34,206,.1)}
.tag-row{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0}
.tag{padding:6px 14px;border:1.5px solid var(--bd);border-radius:18px;font-size:.74rem;font-weight:700;color:var(--t2);background:var(--sf);cursor:pointer}
.tag.on{background:var(--purp);border-color:var(--purp);color:#fff}
.pl-row{display:flex;align-items:center;gap:10px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:10px 13px;margin-bottom:7px}
.pl-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purp),var(--purp2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0;overflow:hidden}
.pl-av img{width:100%;height:100%;object-fit:cover}
.pl-name{flex:1;font-size:.9rem;font-weight:700}
.badge{font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:10px}
.badge-host{background:#f3e8ff;color:#7e22ce}
.badge-ready{background:#dcfce7;color:#16a34a}
.badge-bot{background:#fef3c7;color:#92400e}
.term-box{font-family:Lexend,sans-serif;font-size:1.8rem;font-weight:900;color:#fff;text-align:center;padding:20px;background:linear-gradient(135deg,#3b0764,#6d28d9);border-radius:18px;margin-bottom:14px}
.term-cat{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:2px;margin-top:6px;text-transform:uppercase}
.hint-card{background:var(--sf);border:2px solid var(--bd);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.2s;display:flex;gap:10px}
.hint-card:active,.hint-card.sel{border-color:var(--gold);background:#fffbf0;transform:scale(.99)}
.hint-num{font-family:Lexend,sans-serif;font-size:.95rem;font-weight:900;color:var(--purp);min-width:24px}
.hint-txt{font-size:.86rem;line-height:1.65;color:var(--tx)}
.shown-hint{background:linear-gradient(135deg,#faf5ff,#ede9fe);border:2px solid #c4b5fd;border-radius:16px;padding:14px;margin-bottom:14px}
.sh-lbl{font-size:.6rem;font-weight:700;color:var(--purp);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.sh-txt{font-size:.9rem;font-weight:600;color:#3b0764;line-height:1.6}
.timer-bar{height:7px;background:var(--s2);border-radius:4px;overflow:hidden;margin-bottom:12px}
.timer-fill{height:100%;background:linear-gradient(90deg,#16a34a,#a855f7);border-radius:4px;transition:width 1s linear}
.timer-fill.warn{background:linear-gradient(90deg,var(--gold),var(--red))}
.timer-lbl{text-align:center;font-family:Lexend,sans-serif;font-size:1.2rem;font-weight:900;color:var(--purp);margin-bottom:8px}
.ans-box{background:linear-gradient(135deg,#1a0a2e,#3b0764);border-radius:18px;padding:20px;margin-bottom:12px}
.ans-lbl{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.55);text-align:center;margin-bottom:12px}
.ans-inp{width:100%;padding:14px;border:2px solid rgba(255,255,255,.2);border-radius:14px;background:rgba(255,255,255,.08);color:#fff;font-size:1rem;font-family:inherit;outline:none;text-align:center}
.ans-inp:focus{border-color:#a855f7}
.ans-inp::placeholder{color:rgba(255,255,255,.3)}
.vote-card{background:var(--sf);border:2px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:9px;cursor:pointer;transition:.18s}
.vote-card:active{transform:scale(.98);border-color:var(--purp)}
.vote-card.voted{border-color:#a855f7;background:#faf5ff;pointer-events:none}
.res-card{border-radius:14px;padding:13px;margin-bottom:9px}
.res-card.correct{background:#f0fdf4;border:2px solid #86efac}
.res-card.decoy{background:#fdf4ff;border:2px solid #e9d5ff}
.res-card.nobody{background:var(--s2);border:2px solid var(--bd);opacity:.6}
.sc-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:13px;margin-bottom:7px}
.sc-row.top{background:#fffbf0;border-color:#fde68a}
.sc-pts{font-family:Lexend,sans-serif;font-size:1.3rem;font-weight:900;color:var(--gold);min-width:40px;text-align:center}
.wait-box{background:var(--s2);border-radius:16px;padding:24px;text-align:center;margin:10px 0}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid rgba(126,34,206,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.turn-banner{background:linear-gradient(135deg,#3b0764,#6d28d9);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tb-name{font-family:Lexend,sans-serif;font-size:.95rem;font-weight:800;color:#fff}
.tb-sub{font-size:.68rem;color:rgba(255,255,255,.5);margin-top:2px}
.my-turn-badge{background:rgba(168,85,247,.25);color:#e9d5ff;font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:10px}
.tcon{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:9998;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:var(--pri);color:#fff;padding:9px 20px;border-radius:26px;font-weight:700;font-size:.82rem;white-space:nowrap;animation:tin .22s ease}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{background:#16a34a}.toast.err{background:#dc2626}
@keyframes cfa{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px) rotate(720deg)}}
.cp{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:9999;animation:cfa .9s ease forwards}
#topBar{position:fixed;top:0;left:0;right:0;z-index:90;height:56px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.tbt{font-family:Lexend,sans-serif;font-size:.9rem;font-weight:800;color:var(--purp)}
#app{max-width:520px;margin:0 auto;padding:68px 14px 30px}
</style>
</head>
<body>

<div class="tcon" id="tc"></div>

<!-- ══ SCREENS ══ -->
<div id="app">

<!-- LOGIN -->
<div id="sLogin">
  <div style="text-align:center;padding:40px 0 30px">
    <div style="font-size:3rem;margin-bottom:8px">💡</div>
    <div style="font-family:Lexend,sans-serif;font-size:2rem;font-weight:900;color:var(--purp)">تلميحة</div>
    <div style="font-size:.82rem;color:var(--t3);margin-top:4px">لعبة التضليل والذكاء</div>
  </div>
  <div class="card">
    <div class="eyb">تسجيل الدخول</div>
    <div class="sht">اكتب اسمك <em>👋</em></div>
    <input class="inp" id="nameInp" type="text" placeholder="اسمك هنا..." maxlength="20" autocomplete="off" style="margin-bottom:12px">
    <button class="btn-purp" onclick="doLogin()">دخول →</button>
  </div>
</div>

<!-- HOME -->
<div id="sHome" class="hidden">
  <header id="topBar">
    <div class="tbt">💡 تلميحة</div>
    <div id="topUser" style="font-size:.82rem;font-weight:700;color:var(--t2)"></div>
  </header>
  <div class="card" id="homeCard">
    <div class="eyb">الرئيسية</div>
    <div class="sht">مرحباً <em id="homeName"></em> 👋</div>
    <div id="homeStatus" style="font-size:.8rem;color:var(--t3);margin-bottom:14px;padding:8px;background:var(--s2);border-radius:10px;text-align:center"></div>
    <button class="btn-purp" onclick="navLobby()" style="margin-bottom:8px">🎮 غرفة اللعب</button>
    <button class="btn-gray" onclick="navStats()" style="margin-bottom:8px">📊 الإحصاءات</button>
    <button class="btn-gray" onclick="doLogout()" style="font-size:.82rem">🚪 تسجيل خروج</button>
  </div>
</div>

<!-- LOBBY -->
<div id="sLobby" class="hidden">
  <header id="topBar2" style="position:fixed;top:0;left:0;right:0;z-index:90;height:56px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px">
    <div class="tbt">💡 تلميحة</div>
    <button onclick="navHome()" style="background:var(--s2);color:var(--t2);padding:6px 12px;font-size:.78rem;border-radius:10px;border:1px solid var(--bd)">↩ رجوع</button>
  </header>
  <div id="lobbyContent"></div>
</div>

<!-- GAME -->
<div id="sGame" class="hidden">
  <header id="topBar3" style="position:fixed;top:0;left:0;right:0;z-index:90;height:56px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:10px">
    <div class="tbt" style="flex:1">💡 تلميحة</div>
    <div id="gameTopScore" style="font-size:.78rem;font-weight:700;color:var(--purp)"></div>
  </header>
  <div id="gameContent"></div>
</div>

<!-- STATS -->
<div id="sStats" class="hidden">
  <header style="position:fixed;top:0;left:0;right:0;z-index:90;height:56px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px">
    <div class="tbt">📊 إحصاءات</div>
    <button onclick="navHome()" style="background:var(--s2);color:var(--t2);padding:6px 12px;font-size:.78rem;border-radius:10px;border:1px solid var(--bd)">↩ رجوع</button>
  </header>
  <div id="statsContent" style="padding-top:68px"></div>
</div>

</div><!-- #app -->

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
'use strict';

// ══ FIREBASE ══
firebase.initializeApp({
  apiKey:"AIzaSyB9mj2PkgVpX6M_BW1cUMaymY2VWA4pwqg",
  authDomain:"dogs-padel.firebaseapp.com",
  databaseURL:"https://dogs-padel-default-rtdb.firebaseio.com",
  projectId:"dogs-padel",
  storageBucket:"dogs-padel.firebasestorage.app",
  messagingSenderId:"989531067145",
  appId:"1:989531067145:web:2169954011b998bf8779d8"
});
const DB = firebase.database();

// ══ CONSTANTS ══
const ADMIN = 'محمد';
const BOT_NAMES = ['كليب','كلبون','كلباب','كلابا','أبوكلب','أبا كليبة'];
const IS_BOT = n => BOT_NAMES.includes(n);
const TLM_CATS = ['معلومات عامة','دينية','جغرافيا','رياضة','رياضيات','فيزياء','دول','منوعة'];
const TLM_TIMES = [{l:'30 ث',v:30},{l:'60 ث',v:60},{l:'دقيقتان',v:120}];
const TLM_ROUNDS = [1,2,3,4,5];

// ══ BUILTIN QUESTIONS ══
const Q_BUILTIN = [
  {id:'b1',term:'ابن خلدون',cat:'معلومات عامة',
   hints:['ولد في تونس عام 1332','أسّس علم الاجتماع قبل أوغست كونت','كتابه "المقدمة" من أعظم المؤلفات الفكرية','عمل قاضياً في مصر','شرح دورة الحضارات بمفهوم "العصبية"'],
   botAnswers:['ابن بطوطة','ابن رشد','الفارابي','ابن سينا']},
  {id:'b2',term:'ثقب أسود',cat:'فيزياء',
   hints:['جاذبيته تمنع حتى الضوء من الهروب','تنبأ به أينشتاين في النسبية العامة','تُسمّى حدوده "أفق الحدث"','التُقطت أول صورة له عام 2019','كتلته قد تعادل مليارات شمس'],
   botAnswers:['نجم نيوتروني','مجرة درب التبانة','نجم عملاق','ثقب دودي']},
  {id:'b3',term:'جبل إيفرست',cat:'جغرافيا',
   hints:['يقع على الحدود بين نيبال والصين','ارتفاعه 8848 متراً','سُمّي على اسم مساح بريطاني','أول من تسلّقه هيلاري ونورغاي 1953','يزداد ارتفاعاً كل عام'],
   botAnswers:['جبل كيليمنجارو','جبل ماكنلي','جبل أكونكاغوا','جبل لوتسه']},
  {id:'b4',term:'غزوة الخندق',cat:'دينية',
   hints:['وقعت في السنة الخامسة من الهجرة','اقترحها سلمان الفارسي','الأحزاب بلغوا عشرة آلاف','الحصار استمر شهراً دون قتال','انتهت بريح شديدة وبرد'],
   botAnswers:['غزوة بدر','غزوة أحد','غزوة تبوك','فتح مكة']},
  {id:'b5',term:'غاز الهيليوم',cat:'فيزياء',
   hints:['العنصر الثاني في الجدول الدوري','أدنى درجة غليان بين العناصر','اكتُشف في الشمس أولاً','يُبرّد مغناطيسات الرنين المغناطيسي','يجعل الصوت حاداً عند استنشاقه'],
   botAnswers:['غاز الهيدروجين','غاز النيون','غاز الأرغون','غاز الزينون']},
  {id:'b6',term:'نهر الأمازون',cat:'جغرافيا',
   hints:['يقع معظمه في البرازيل','أطول أو ثاني أطول نهر','يصبّ في المحيط الأطلسي','حوضه 40% من أمريكا الجنوبية','فيه أكثر من 3000 نوع سمك'],
   botAnswers:['نهر النيل','نهر المسيسيبي','نهر الكونغو','نهر الأورينوكو']},
  {id:'b7',term:'الكعبة المشرفة',cat:'دينية',
   hints:['تقع في قلب المسجد الحرام','شكلها مكعب ارتفاعه 13 متراً','يتجه إليها المسلمون في الصلاة','تُكسى بالقماش الأسود المطرز','في ركنها الحجر الأسود'],
   botAnswers:['المسجد النبوي','المسجد الأقصى','قبة الصخرة','مسجد قباء']},
  {id:'b8',term:'الجاذبية',cat:'فيزياء',
   hints:['صاغ قانونها نيوتن بعد تفاحة','أضعف القوى الأساسية الأربع','تشوّه الزمكان وفق أينشتاين','غيابها يُسبّب انعدام الوزن','تُقدَّر كتلة الكواكب بتأثيرها'],
   botAnswers:['الكهرومغناطيسية','القوة النووية القوية','قوة لورنتز','الطرد المركزي']},
  {id:'b9',term:'المملكة العربية السعودية',cat:'دول',
   hints:['تحتل معظم شبه الجزيرة العربية','أكبر احتياطي نفطي مؤكد','تأسست عام 1932','لا يوجد فيها نهر دائم','تطلّ على البحر الأحمر وخليج عُمان'],
   botAnswers:['الإمارات','العراق','إيران','اليمن']},
  {id:'b10',term:'رونالدو',cat:'رياضة',
   hints:['من مواليد جزيرة ماديرا 1985','يلعب في نادي النصر السعودي','فاز بالكرة الذهبية 5 مرات','يحمل رقم قياسي في كأس العالم','اسمه مستوحى من رئيس أمريكي'],
   botAnswers:['ميسي','نيمار','مبابي','بنزيمة']},
];

// ══ HELPERS ══
const $ = id => document.getElementById(id);
const h = el => {if(el)el.classList.add('hidden')};
const s = el => {if(el)el.classList.remove('hidden')};
const san = t => String(t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shuf = a => {for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const ls = (k,v) => {try{if(v===undefined)return localStorage.getItem(k);if(v===null)localStorage.removeItem(k);else localStorage.setItem(k,typeof v==='object'?JSON.stringify(v):v);}catch(e){}};
const lg = k => {try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}};

function toast(msg,type='',dur=2600){
  const c=$('tc');if(!c)return;
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;c.appendChild(el);
  setTimeout(()=>{el.style.animation='tin .25s ease reverse';setTimeout(()=>el.remove(),250)},Math.max(dur,msg.length*55));
}
function confetti(){
  const cols=['#a855f7','#dc2626','#1d4ed8','#16a34a','#e89b10'];
  for(let i=0;i<40;i++)setTimeout(()=>{
    const el=document.createElement('div');el.className='cp';
    el.style.cssText=`left:${10+Math.random()*80}vw;top:${40+Math.random()*30}vh;background:${cols[i%5]};width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${.6+Math.random()*.7}s;animation-delay:${Math.random()*.4}s`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
  },i*15);
}
function avEl(name,sz=36){
  const initials=name?name[0]:'?';
  const colors=['#7e22ce','#1d4ed8','#dc2626','#16a34a','#d97706','#0369a1','#be185d','#15803d'];
  const ci=name?name.charCodeAt(0)%colors.length:0;
  return `<div class="pl-av" style="width:${sz}px;height:${sz}px;font-size:${sz*.4}px;background:${colors[ci]}">${initials}</div>`;
}
function allQ(){
  const custom=lg('tlm_q')||[];
  return[...Q_BUILTIN,...custom];
}
function pickQ(cats){
  const pool=allQ().filter(q=>!cats||!cats.length||cats.includes(q.cat));
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:Q_BUILTIN[0];
}
function pickBotAns(q,usedAnswers){
  const used=new Set(usedAnswers.map(a=>a.toLowerCase().replace(/\s/g,'')));
  used.add(q.term.toLowerCase().replace(/\s/g,''));
  const pool=q.botAnswers||[];
  const unused=pool.filter(a=>!used.has(a.toLowerCase().replace(/\s/g,'')));
  if(unused.length)return unused[Math.floor(Math.random()*unused.length)];
  if(pool.length)return pool[Math.floor(Math.random()*pool.length)];
  return 'لا أعرف';
}

// ══ APP STATE ══
let ME = {name:'',isAdmin:false};
let _room = null;
let _roomOff = null; // unsubscribe function
let _timer = null;

// ══ NAV ══
const PAGES=['sLogin','sHome','sLobby','sGame','sStats'];
function showPage(id){
  PAGES.forEach(p=>{const el=$(p);if(el)h(el)});
  const el=$(id);if(el)s(el);
}

// ══ LOGIN ══
function doLogin(){
  const inp=$('nameInp');
  const name=(inp&&inp.value.trim())||'';
  if(!name||name.length<2){toast('اكتب اسمك (حرفان على الأقل)','err');return;}
  ME.name=name;
  ME.isAdmin=(name===ADMIN);
  ls('tlm_name',name);
  // Register presence
  const pref=DB.ref('tlm2_presence/'+encodeURIComponent(name));
  pref.set({name,ts:Date.now()});
  pref.onDisconnect().remove();
  // Listen online count
  DB.ref('tlm2_presence').on('value',snap=>{
    const el=$('homeStatus');
    if(el)el.textContent=`${snap.numChildren()} متصل الآن 🟢`;
  });
  showHome();
  listenRoom();
}

function showHome(){
  showPage('sHome');
  s($('topBar'));
  $('homeName').textContent=ME.name;
  $('topUser').textContent=ME.name+(ME.isAdmin?' 👑':'');
}

function doLogout(){
  clearInterval(_timer);
  if(_roomOff){_roomOff();_roomOff=null;}
  DB.ref('tlm2_presence/'+encodeURIComponent(ME.name)).remove();
  ME={name:'',isAdmin:false};
  ls('tlm_name',null);
  _room=null;
  showPage('sLogin');
  const inp=$('nameInp');if(inp)inp.value='';
}

function navHome(){
  clearInterval(_timer);
  showPage('sHome');
}
function navLobby(){showPage('sLobby');renderLobby();}
function navStats(){
  showPage('sStats');
  const el=$('statsContent');if(!el)return;
  const st=lg('tlm_stats')||{};
  const keys=Object.keys(st).sort((a,b)=>(st[b].pts||0)-(st[a].pts||0));
  if(!keys.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--t3)">لا توجد إحصاءات بعد</div>';return;}
  const medals=['🥇','🥈','🥉'];
  el.innerHTML='<div class="card">'+keys.map((n,i)=>`
    <div class="sc-row${i===0?' top':''}">
      <span style="font-size:1.1rem;min-width:26px">${medals[i]||''}</span>
      ${avEl(n,34)}
      <div style="flex:1">
        <div style="font-size:.9rem;font-weight:700">${san(n)}</div>
        <div style="font-size:.66rem;color:var(--t3)">${st[n].games||0} لعبة · ${st[n].wins||0} فوز</div>
      </div>
      <div class="sc-pts">${st[n].pts||0}</div>
    </div>`).join('')+'</div>';
}

// ══ ROOM LISTENER ══
function listenRoom(){
  if(_roomOff){_roomOff();_roomOff=null;}
  const ref=DB.ref('tlm2_room');
  const handler=ref.on('value',snap=>{
    const prev=_room?_room.phase:null;
    _room=snap.exists()?snap.val():null;
    const cur=_room?_room.phase:null;
    // Update home status
    if($('sHome')&&!$('sHome').classList.contains('hidden')){
      if(_room&&_room.phase==='lobby'){
        $('homeStatus').textContent=`غرفة مفتوحة — ${Object.keys(_room.players||{}).length} لاعب 🎮`;
      }
    }
    // Auto-navigate to game if game started
    if(_room&&cur&&cur!=='lobby'){
      if($('sLobby')&&!$('sLobby').classList.contains('hidden')||
         $('sHome')&&!$('sHome').classList.contains('hidden')){
        showPage('sGame');renderGame();
      }else if($('sGame')&&!$('sGame').classList.contains('hidden')){
        renderGame();
      }
    }
    // Re-render lobby if open
    if($('sLobby')&&!$('sLobby').classList.contains('hidden'))renderLobby();
    // Room closed
    if(!_room&&(cur!==null||prev)){
      if($('sGame')&&!$('sGame').classList.contains('hidden')){
        navHome();toast('انتهت اللعبة','ok');
      }
    }
  });
  _roomOff=()=>ref.off('value',handler);
}

// ══ LOBBY ══
function renderLobby(){
  const el=$('lobbyContent');if(!el)return;
  if(!_room){
    // No room
    if(ME.isAdmin){
      el.innerHTML=`<div class="card" style="margin-top:68px">
        <div class="eyb">غرفة اللعب</div>
        <div class="sht">إنشاء غرفة <em>🎮</em></div>
        <div style="margin-bottom:12px">
          <div style="font-size:.76rem;font-weight:700;color:var(--t2);margin-bottom:7px">الفئات</div>
          <div class="tag-row" id="lCats">${TLM_CATS.map(c=>`<button class="tag on" onclick="this.classList.toggle('on')">${c}</button>`).join('')}</div>
        </div>
        <div style="margin-bottom:12px">
          <div style="font-size:.76rem;font-weight:700;color:var(--t2);margin-bottom:7px">وقت الإجابة</div>
          <div class="tag-row" id="lTime">${TLM_TIMES.map((t,i)=>`<button class="tag${i===1?' on':''}" onclick="selectOne('lTime',this)">${t.l}</button>`).join('')}</div>
        </div>
        <div style="margin-bottom:16px">
          <div style="font-size:.76rem;font-weight:700;color:var(--t2);margin-bottom:7px">جولات لكل لاعب</div>
          <div class="tag-row" id="lRounds">${TLM_ROUNDS.map((r,i)=>`<button class="tag${i===1?' on':''}" onclick="selectOne('lRounds',this)">${r}</button>`).join('')}</div>
        </div>
        <button class="btn-green" onclick="createRoom()">✨ إنشاء الغرفة</button>
      </div>`;
    }else{
      el.innerHTML=`<div class="card" style="margin-top:68px">
        <div style="text-align:center;padding:30px 0">
          <div style="font-size:2.5rem;margin-bottom:12px">⏳</div>
          <div style="font-size:.9rem;font-weight:700;color:var(--t2)">لا توجد غرفة نشطة</div>
          <div style="font-size:.76rem;color:var(--t3);margin-top:6px">انتظر حتى ينشئ المشرف غرفة</div>
        </div>
      </div>`;
    }
    return;
  }
  if(_room.phase!=='lobby'){showPage('sGame');renderGame();return;}

  // Active lobby
  const players=Object.values(_room.players||{});
  const bots=players.filter(p=>IS_BOT(p.name));
  const humans=players.filter(p=>!IS_BOT(p.name));

  // Auto-join if not in room
  const myKey=encodeURIComponent(ME.name);
  if(!_room.players||!_room.players[myKey]){
    DB.ref('tlm2_room/players/'+myKey).set({name:ME.name,joinedAt:Date.now()});
  }

  const botHTML=ME.isAdmin?`
    <div style="margin-bottom:12px">
      <div style="font-size:.76rem;font-weight:700;color:var(--t2);margin-bottom:7px">🤖 بوتات</div>
      <div class="tag-row">${BOT_NAMES.map(bn=>{
        const active=_room.players&&_room.players[encodeURIComponent(bn)];
        return`<button class="tag${active?' on':''}" onclick="toggleBot('${bn.replace(/'/g,"\\'")}')">🤖 ${san(bn)}</button>`;
      }).join('')}</div>
    </div>`:'';

  const startBtn=ME.isAdmin?`<button class="btn-green" onclick="startGame()" ${players.length<2?'disabled':''}>🚀 ابدأ اللعبة (${players.length} لاعبين)</button>`:'';
  const leaveBtn=`<button class="btn-gray" onclick="leaveRoom()" style="margin-top:8px;font-size:.82rem">🚪 مغادرة</button>`;
  const closeBtn=ME.isAdmin?`<button class="btn-red btn-sm" onclick="closeRoom()" style="margin-top:8px">🗑️ حذف الغرفة</button>`:'';

  el.innerHTML=`<div class="card" style="margin-top:68px">
    <div class="eyb">غرفة اللعب</div>
    <div class="sht">جاهزون للعب <em>🎮</em></div>
    <div style="margin-bottom:4px;font-size:.74rem;color:var(--t3)">الفئات: ${(_room.settings&&_room.settings.cats&&_room.settings.cats.length)?_room.settings.cats.join('، '):'الكل'} · ${_room.settings&&_room.settings.time?_room.settings.time+'ث':'60ث'} · ${_room.settings&&_room.settings.rounds?_room.settings.rounds:2} جولات</div>
    <div style="margin:12px 0">
      ${players.map(p=>`<div class="pl-row">
        ${avEl(p.name,36)}
        <span class="pl-name">${san(p.name)}</span>
        <span class="badge ${p.name===_room.host?'badge-host':IS_BOT(p.name)?'badge-bot':'badge-ready'}">${p.name===_room.host?'مضيف 👑':IS_BOT(p.name)?'بوت 🤖':'جاهز ✓'}</span>
        ${ME.isAdmin&&p.name!==ME.name?`<button onclick="kickPlayer('${p.name.replace(/'/g,"\\'")}');" style="background:#fee2e2;color:#b91c1c;padding:3px 8px;font-size:.65rem;border-radius:8px;border:none;cursor:pointer;margin-right:4px">✕</button>`:''}
      </div>`).join('')}
      ${!players.length?'<div style="text-align:center;color:var(--t3);font-size:.82rem;padding:10px">لا يوجد لاعبون بعد</div>':''}
    </div>
    ${botHTML}
    ${startBtn}
    ${leaveBtn}
    ${closeBtn}
  </div>`;
}

function selectOne(groupId,btn){
  const grp=$(groupId);if(!grp)return;
  grp.querySelectorAll('.tag').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function createRoom(){
  const cats=[];
  const catEl=$('lCats');if(catEl)catEl.querySelectorAll('.tag.on').forEach(b=>cats.push(b.textContent));
  const timeEl=$('lTime');const timeBtn=timeEl&&timeEl.querySelector('.tag.on');
  const time=timeBtn?TLM_TIMES.find(t=>t.l===timeBtn.textContent)?.v||60:60;
  const roundEl=$('lRounds');const roundBtn=roundEl&&roundEl.querySelector('.tag.on');
  const rounds=roundBtn?parseInt(roundBtn.textContent)||2:2;
  const myKey=encodeURIComponent(ME.name);
  DB.ref('tlm2_room').set({
    host:ME.name,phase:'lobby',
    settings:{cats,time,rounds},
    players:{[myKey]:{name:ME.name,joinedAt:Date.now()}}
  }).then(()=>toast('تم إنشاء الغرفة ✓','ok'));
}

function closeRoom(){
  if(!confirm('حذف الغرفة؟'))return;
  DB.ref('tlm2_room').remove();
  navHome();
}

function leaveRoom(){
  DB.ref('tlm2_room/players/'+encodeURIComponent(ME.name)).remove();
  navHome();
}

function kickPlayer(name){
  if(!ME.isAdmin)return;
  DB.ref('tlm2_room/players/'+encodeURIComponent(name)).remove();
}

function toggleBot(botName){
  if(!ME.isAdmin||!_room)return;
  const pk=encodeURIComponent(botName);
  if(_room.players&&_room.players[pk]){
    DB.ref('tlm2_room/players/'+pk).remove();
  }else{
    DB.ref('tlm2_room/players/'+pk).set({name:botName,joinedAt:Date.now(),isBot:true});
  }
}

// ══ GAME ══
function startGame(){
  if(!ME.isAdmin||!_room)return;
  const players=Object.values(_room.players||{}).map(p=>p.name);
  if(players.length<2){toast('يجب لاعبان على الأقل','err');return;}
  const order=shuf(players);
  const scores={};order.forEach(p=>scores[p]=0);
  const s2=_room.settings||{cats:[],time:60,rounds:2};
  const q=pickQ(s2.cats);
  DB.ref('tlm2_room').update({
    phase:'pick_hint',turnOrder:order,currentTurn:0,
    totalTurns:order.length*s2.rounds,
    scores,currentQ:q,
    selectedHint:null,answers:{},votes:{}
  });
}

function renderGame(){
  const el=$('gameContent');if(!el||!_room)return;
  clearInterval(_timer);
  // Update score in topbar
  const sc=$('gameTopScore');
  if(sc&&_room.scores)sc.textContent=`${san(ME.name)}: ${_room.scores[ME.name]||0} نقطة`;
  switch(_room.phase){
    case 'pick_hint':   el.innerHTML=renderPickHint();break;
    case 'answering':   el.innerHTML=renderAnswering();startTimerUI();break;
    case 'voting':      el.innerHTML=renderVoting();break;
    case 'round_result':el.innerHTML=renderRoundResult();break;
    case 'final':       el.innerHTML=renderFinal();confetti();break;
    default: el.innerHTML='';
  }
}

function renderPickHint(){
  const q=_room.currentQ;if(!q)return'';
  const turn=_room.currentTurn||0;
  const order=_room.turnOrder||[];
  const turnPlayer=order[turn%order.length];
  const isMe=turnPlayer===ME.name;
  return`<div style="padding-top:68px">
    <div class="turn-banner">
      ${avEl(turnPlayer,38)}
      <div><div class="tb-name">${san(turnPlayer)}</div><div class="tb-sub">${isMe?'دورك':'يختار المعلومة...'}</div></div>
      ${isMe?'<span class="my-turn-badge">دورك ✨</span>':''}
    </div>
    <div class="term-box">${san(q.term)}<div class="term-cat">${san(q.cat)}</div></div>
    ${isMe?`
      <div style="font-size:.82rem;color:var(--t2);text-align:center;margin-bottom:12px;font-weight:600">اختر معلومة واحدة للعرض</div>
      ${q.hints.map((h,i)=>`<div class="hint-card" onclick="selectHint(${i})"><div class="hint-num">${i+1}</div><div class="hint-txt">${san(h)}</div></div>`).join('')}
    `:`<div class="wait-box"><span class="spinner"></span> ${san(turnPlayer)} يختار المعلومة...</div>`}
  </div>`;
}

function selectHint(idx){
  if(!ME.isAdmin&&_room.turnOrder[_room.currentTurn%_room.turnOrder.length]!==ME.name)return;
  DB.ref('tlm2_room').update({phase:'answering',selectedHint:idx,answers:{},votes:{},answerStart:Date.now()});
}

function renderAnswering(){
  const q=_room.currentQ;if(!q)return'';
  const turn=_room.currentTurn||0;
  const order=_room.turnOrder||[];
  const turnPlayer=order[turn%order.length];
  const isMyTurn=turnPlayer===ME.name;
  const myAns=_room.answers&&_room.answers[encodeURIComponent(ME.name)];
  const answered=Object.keys(_room.answers||{}).length;
  const total=order.filter(p=>!IS_BOT(p)&&p!==turnPlayer).length;
  const hint=q.hints[_room.selectedHint||0];
  const timeVal=_room.settings&&_room.settings.time?_room.settings.time:60;
  return`<div style="padding-top:68px">
    <div class="turn-banner">
      ${avEl(turnPlayer,38)}
      <div><div class="tb-name">${san(turnPlayer)}</div><div class="tb-sub">صاحب الدور</div></div>
    </div>
    <div class="term-box" style="font-size:1.4rem">${san(q.term)}<div class="term-cat">${san(q.cat)}</div></div>
    <div class="shown-hint"><div class="sh-lbl">التلميح</div><div class="sh-txt">${san(hint)}</div></div>
    <div class="timer-lbl" id="timerLbl">${timeVal}</div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    ${isMyTurn?`
      <div class="wait-box">
        <div style="font-size:1.5rem;margin-bottom:8px">⏳</div>
        <div style="font-weight:700;color:var(--t2)">أنت صاحب الدور — انتظر إجابات اللاعبين</div>
        <div style="font-size:.78rem;color:var(--t3);margin-top:6px">${answered}/${total} أجابوا</div>
        ${ME.isAdmin?`<button class="btn-purp" onclick="doEndAnswering()" style="margin-top:12px;padding:10px">⏩ انتهى الوقت</button>`:''}
      </div>`
    :myAns?`
      <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:.9rem;font-weight:700;color:#16a34a">✅ تم تسجيل إجابتك</div>
        <div style="font-size:.74rem;color:var(--t3);margin-top:4px">${answered}/${total} أجابوا</div>
      </div>`
    :`<div class="ans-box">
        <div class="ans-lbl">ما هو المصطلح؟</div>
        <input class="ans-inp" id="ansInp" type="text" placeholder="اكتب إجابتك..." autocomplete="off" onkeypress="if(event.key==='Enter')doAnswer()">
        <button class="btn-purp" onclick="doAnswer()" style="margin-top:10px">✓ تأكيد</button>
      </div>`}
  </div>`;
}

function startTimerUI(){
  clearInterval(_timer);
  if(!_room||!_room.answerStart)return;
  const total=_room.settings&&_room.settings.time?_room.settings.time:60;
  _timer=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-_room.answerStart)/1000);
    const left=Math.max(0,total-elapsed);
    const lbl=$('timerLbl'),fill=$('timerFill');
    if(!lbl||!fill){clearInterval(_timer);return;}
    lbl.textContent=left;
    const pct=(left/total)*100;
    fill.style.width=pct+'%';
    fill.className='timer-fill'+(left<=10?' warn':'');
    if(left<=0){clearInterval(_timer);if(ME.isAdmin)doEndAnswering();}
  },500);
}

function doAnswer(){
  const inp=$('ansInp');if(!inp||!inp.value.trim())return;
  const raw=inp.value.trim();
  const q=_room.currentQ;
  const correct=raw.toLowerCase().replace(/\s/g,'')===(q.term||'').toLowerCase().replace(/\s/g,'');
  const pk=encodeURIComponent(ME.name);
  if(correct){
    // Mark correct, ask for decoy
    DB.ref('tlm2_room/answers/'+pk).set({ans:raw,correct:true,name:ME.name});
    // Show decoy input
    const el=$('gameContent');
    if(el)el.innerHTML=`<div style="padding-top:68px">
      <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:14px;text-align:center;margin-bottom:14px">
        <div style="font-size:.9rem;font-weight:700;color:#16a34a">✅ إجابة صحيحة!</div>
        <div style="font-size:.8rem;color:var(--t2);margin-top:4px">الآن اكتب إجابة تضليلية 🎭</div>
      </div>
      <div class="ans-box">
        <div class="ans-lbl">اكتب إجابة مشابهة لتخدع الآخرين</div>
        <input class="ans-inp" id="decoyInp" type="text" placeholder="إجابة تضليلية..." autocomplete="off" onkeypress="if(event.key==='Enter')doDecoy()">
        <button class="btn-purp" onclick="doDecoy()" style="margin-top:10px">🎭 تأكيد</button>
      </div>
    </div>`;
  }else{
    DB.ref('tlm2_room/answers/'+pk).set({ans:raw,correct:false,name:ME.name});
    renderGame();
  }
}

function doDecoy(){
  const inp=$('decoyInp');if(!inp||!inp.value.trim())return;
  DB.ref('tlm2_room/answers/'+encodeURIComponent(ME.name)+'/decoy').set(inp.value.trim());
  renderGame();
}

function doEndAnswering(){
  clearInterval(_timer);
  if(!ME.isAdmin||!_room)return;
  // Add bot answers
  const q=_room.currentQ;
  const turn=_room.currentTurn||0;
  const order=_room.turnOrder||[];
  const turnPlayer=order[turn%order.length];
  const existing=_room.answers||{};
  const usedAns=Object.values(existing).map(a=>a.decoy||a.ans||'');
  const updates={};
  order.filter(p=>IS_BOT(p)&&p!==turnPlayer).forEach(bot=>{
    const pk=encodeURIComponent(bot);
    if(existing[pk])return;
    updates['tlm2_room/answers/'+pk]={ans:pickBotAns(q,usedAns),correct:false,name:bot,isBot:true};
    usedAns.push(updates['tlm2_room/answers/'+pk].ans);
  });
  if(Object.keys(updates).length){
    DB.ref().update(updates).then(()=>DB.ref('tlm2_room').update({phase:'voting'}));
  }else{
    DB.ref('tlm2_room').update({phase:'voting'});
  }
}

function renderVoting(){
  const q=_room.currentQ;if(!q)return'';
  const turn=_room.currentTurn||0;
  const order=_room.turnOrder||[];
  const turnPlayer=order[turn%order.length];
  const isMyTurn=turnPlayer===ME.name;
  const pk=encodeURIComponent(ME.name);
  const myVote=_room.votes&&_room.votes[pk]!=null;
  const answers=_room.answers||{};
  // Build options
  const opts=[{text:q.term,real:true,owner:'__real__'}];
  Object.values(answers).forEach(d=>{
    if(!d.name||d.name===turnPlayer)return;
    const show=d.decoy||d.ans;
    if(show&&show.toLowerCase().replace(/\s/g,'')!==q.term.toLowerCase().replace(/\s/g,''))
      opts.push({text:show,real:false,owner:d.name});
  });
  const shuffled=shuf([...opts]);
  const vCount=Object.keys(_room.votes||{}).length;
  const vNeeded=order.filter(p=>p!==turnPlayer&&!IS_BOT(p)).length;

  return`<div style="padding-top:68px">
    <div class="turn-banner">
      ${avEl(turnPlayer,38)}
      <div><div class="tb-name">${san(turnPlayer)}</div><div class="tb-sub">صاحب الدور</div></div>
    </div>
    <div class="term-box" style="font-size:1.4rem">${san(q.term)}<div class="term-cat">${san(q.cat)}</div></div>
    <div class="shown-hint"><div class="sh-lbl">التلميح</div><div class="sh-txt">${san(q.hints[_room.selectedHint||0])}</div></div>
    <div style="font-size:.82rem;color:var(--t2);text-align:center;margin-bottom:12px;font-weight:600">${isMyTurn?`${vCount}/${vNeeded} صوّتوا`:'اختر الإجابة الصحيحة'}</div>
    ${!isMyTurn&&!myVote
      ?shuffled.map((opt,i)=>`<div class="vote-card" onclick="doVote(${i},${JSON.stringify(shuffled).replace(/'/g,"&#39;")})"><div style="font-size:.9rem;font-weight:700">${san(opt.text)}</div></div>`).join('')
      :!isMyTurn&&myVote
        ?`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:14px;text-align:center"><div style="font-weight:700;color:#16a34a">✅ تم تسجيل صوتك</div><div style="font-size:.74rem;color:var(--t3);margin-top:4px">${vCount}/${vNeeded} صوّتوا</div></div>`
        :`<div class="wait-box"><span class="spinner"></span> اللاعبون يصوّتون...</div>`}
    ${ME.isAdmin?`<button class="btn-purp" onclick="doReveal()" style="margin-top:12px;padding:10px">📊 اكشف النتائج</button>`:''}
  </div>`;
}

function doVote(idx,opts){
  const chosen=opts[idx];
  DB.ref('tlm2_room/votes/'+encodeURIComponent(ME.name)).set({idx,owner:chosen.owner,voterName:ME.name});
}

function doReveal(){
  if(!ME.isAdmin||!_room)return;
  const q=_room.currentQ;
  const turn=_room.currentTurn||0;
  const order=_room.turnOrder||[];
  const turnPlayer=order[turn%order.length];
  const answers=_room.answers||{};

  // Build opts (same as voting)
  const opts=[{text:q.term,real:true,owner:'__real__'}];
  Object.values(answers).forEach(d=>{
    if(!d.name||d.name===turnPlayer)return;
    const show=d.decoy||d.ans;
    if(show&&show.toLowerCase().replace(/\s/g,'')!==q.term.toLowerCase().replace(/\s/g,''))
      opts.push({text:show,real:false,owner:d.name});
  });
  const shuffled=shuf([...opts]);

  // Bot votes
  const botUpdates={};
  order.filter(p=>IS_BOT(p)&&p!==turnPlayer).forEach(bot=>{
    const pk=encodeURIComponent(bot);
    if(_room.votes&&_room.votes[pk])return;
    const vi=Math.random()<0.4?0:Math.floor(Math.random()*shuffled.length);
    botUpdates['tlm2_room/votes/'+pk]={idx:vi,owner:shuffled[Math.min(vi,shuffled.length-1)].owner,voterName:bot,isBot:true};
  });

  const compute=(allVotes)=>{
    const correctVoters=[];const deceivedBy={};
    Object.values(allVotes).forEach(v=>{
      if(v.owner==='__real__')correctVoters.push(v.voterName);
      else{if(!deceivedBy[v.owner])deceivedBy[v.owner]=[];deceivedBy[v.owner].push(v.voterName);}
    });
    const rPts={};order.forEach(p=>rPts[p]=0);
    order.filter(p=>p!==turnPlayer).forEach(p=>{
      if(correctVoters.includes(p))rPts[p]+=2;
      if(deceivedBy[p])rPts[p]+=deceivedBy[p].length;
    });
    const nc=correctVoters.length;
    rPts[turnPlayer]=nc===0?4:nc===1?3:nc<=2?1:0;
    const newSc={..._room.scores||{}};
    order.forEach(p=>newSc[p]=(newSc[p]||0)+(rPts[p]||0));
    const resOpts=shuffled.map(opt=>({
      ...opt,
      voters:opt.real?correctVoters:(deceivedBy[opt.owner]||[])
    }));
    DB.ref('tlm2_room').update({phase:'round_result',roundPts:rPts,scores:newSc,resOpts,nc});
  };

  if(Object.keys(botUpdates).length){
    DB.ref().update(botUpdates).then(()=>DB.ref('tlm2_room/votes').once('value').then(s=>compute(s.val()||{})));
  }else compute(_room.votes||{});
}

function renderRoundResult(){
  if(!_room.resOpts)return'';
  const q=_room.currentQ;
  const turn=_room.currentTurn||0;
  const order=_room.turnOrder||[];
  const turnPlayer=order[turn%order.length];
  const rPts=_room.roundPts||{};
  const scores=_room.scores||{};
  const nc=_room.nc||0;
  const sortedOrder=[...order].sort((a,b)=>(scores[b]||0)-(scores[a]||0));

  const optsHtml=(_room.resOpts||[]).map(opt=>{
    const cls=opt.real?'correct':opt.voters&&opt.voters.length?'decoy':'nobody';
    const label=opt.real?'✅ الصحيحة':`🎭 ${san(opt.owner)}`;
    const votersHtml=opt.voters&&opt.voters.length
      ?opt.voters.map(v=>`<span style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:600">${san(v)}</span>`).join(' ')
      :`<span style="font-size:.7rem;color:var(--t3)">لم يختره أحد</span>`;
    return`<div class="res-card ${cls}">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:.9rem;font-weight:700">${san(opt.text)}</span>
        <span style="font-size:.62rem;color:var(--t3)">${label}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${votersHtml}</div>
    </div>`;
  }).join('');

  const ptsHtml=sortedOrder.map((p,i)=>`
    <div class="sc-row${i===0?' top':''}">
      <span style="min-width:24px;font-size:.9rem">${['🥇','🥈','🥉'][i]||''}</span>
      ${avEl(p,32)}
      <span style="flex:1;font-size:.86rem;font-weight:700">${san(p)}${IS_BOT(p)?'<span style="font-size:.6rem;color:var(--t3)"> 🤖</span>':''}</span>
      <span style="font-size:.76rem;font-weight:700;color:${(rPts[p]||0)>0?'var(--grn)':'var(--t3)'}">+${rPts[p]||0}</span>
      <span class="sc-pts">${scores[p]||0}</span>
    </div>`).join('');

  const isLast=(turn+1)>=(_room.totalTurns||order.length);
  return`<div style="padding-top:68px">
    <div class="term-box" style="font-size:1.4rem">${san(q.term)}<div class="term-cat">${san(q.cat)}</div></div>
    <div style="text-align:center;font-size:.84rem;color:var(--t2);margin-bottom:14px">عرفها <strong>${nc}</strong> شخص — ${san(turnPlayer)} حصل على <strong style="color:var(--purp)">${rPts[turnPlayer]||0}</strong> نقطة</div>
    ${optsHtml}
    <div style="font-size:.65rem;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin:14px 0 8px">الترتيب</div>
    ${ptsHtml}
    ${ME.isAdmin?`<div style="display:flex;gap:8px;margin-top:14px">
      ${!isLast?`<button class="btn-green" onclick="doNextTurn()" style="flex:1;padding:12px">▶️ التالي</button>`:''}
      <button class="btn-purp" onclick="${isLast?'doFinish()':'doFinish()'}" style="${isLast?'flex:1;padding:12px':'padding:10px 14px;font-size:.78rem'}">${isLast?'🏆 النهاية':'⏩ إنهاء'}</button>
    </div>`:`<div class="wait-box"><span class="spinner"></span> في انتظار المضيف...</div>`}
  </div>`;
}

function doNextTurn(){
  const nextTurn=(_room.currentTurn||0)+1;
  const q=pickQ(_room.settings&&_room.settings.cats);
  DB.ref('tlm2_room').update({phase:'pick_hint',currentTurn:nextTurn,currentQ:q,selectedHint:null,answers:{},votes:{},resOpts:null,roundPts:null});
}

function doFinish(){
  if(!ME.isAdmin||!_room)return;
  const scores=_room.scores||{};
  const order=_room.turnOrder||[];
  const sorted=[...order].filter(p=>!IS_BOT(p)).sort((a,b)=>(scores[b]||0)-(scores[a]||0));
  // Save stats
  sorted.forEach((p,i)=>{
    const st=lg('tlm_stats')||{};
    if(!st[p])st[p]={pts:0,games:0,wins:0};
    st[p].pts=(st[p].pts||0)+(scores[p]||0);
    st[p].games=(st[p].games||0)+1;
    if(i===0)st[p].wins=(st[p].wins||0)+1;
    ls('tlm_stats',st);
  });
  DB.ref('tlm2_room').update({phase:'final',finalScores:scores,winner:sorted[0]||''});
}

function renderFinal(){
  const scores=_room.finalScores||_room.scores||{};
  const order=(_room.turnOrder||[]).filter(p=>!IS_BOT(p));
  const sorted=[...order].sort((a,b)=>(scores[b]||0)-(scores[a]||0));
  const medals=['🥇','🥈','🥉'];
  return`<div style="padding-top:68px">
    <div style="background:linear-gradient(135deg,#3b0764,#7e22ce);border-radius:20px;padding:28px;text-align:center;margin-bottom:18px">
      <div style="font-size:3rem;margin-bottom:8px">🏆</div>
      <div style="font-family:Lexend,sans-serif;font-size:1.4rem;font-weight:900;color:#fff">${san(_room.winner||sorted[0]||'?')}</div>
      <div style="font-size:.82rem;color:rgba(255,255,255,.5);margin-top:4px">${scores[_room.winner||sorted[0]]||0} نقطة</div>
    </div>
    ${sorted.map((p,i)=>`<div class="sc-row${i===0?' top':''}">
      <span style="min-width:28px;font-size:1.1rem">${medals[i]||''}</span>
      ${avEl(p,36)}
      <span style="flex:1;font-size:.9rem;font-weight:700">${san(p)}</span>
      <span class="sc-pts">${scores[p]||0}</span>
    </div>`).join('')}
    ${ME.isAdmin?`<button class="btn-red" onclick="closeRoom()" style="width:100%;margin-top:16px;padding:12px">🗑️ إغلاق الغرفة</button>`:''}
  </div>`;
}

// ══ BOOT ══
window.addEventListener('load',()=>{
  const saved=localStorage.getItem('tlm_name');
  if(saved){
    const nameInp=$('nameInp');if(nameInp)nameInp.value=saved;
    // Auto-login
    ME.name=saved;ME.isAdmin=(saved===ADMIN);
    const pref=DB.ref('tlm2_presence/'+encodeURIComponent(saved));
    pref.set({name:saved,ts:Date.now()});
    pref.onDisconnect().remove();
    DB.ref('tlm2_presence').on('value',snap=>{
      const el=$('homeStatus');
      if(el)el.textContent=`${snap.numChildren()} متصل الآن 🟢`;
    });
    showHome();listenRoom();
  }else{
    showPage('sLogin');
  }
  // Listen for questions from Firebase
  DB.ref('tlm2_q').once('value').then(snap=>{
    if(snap.exists()){const q=snap.val();if(Array.isArray(q))ls('tlm_q',q);}
  });
});
</script>
