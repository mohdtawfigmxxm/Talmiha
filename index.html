<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تلميحة | Talmiha</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* CSS Variables & Theming */
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Readex Pro', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color), #020617);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        /* Typography */
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(to left, #c4b5fd, #8b5cf6); -webkit-background-clip: text; color: transparent; }
        h2 { font-size: 1.5rem; margin-bottom: 1.5rem; font-weight: 600; }
        p { color: var(--text-muted); margin-bottom: 1rem; }

        /* Form Elements */
        input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }
        
        button {
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        button:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }
        button.secondary { background: transparent; border: 1px solid var(--primary); color: var(--text-main); }
        button.secondary:hover { background: rgba(139, 92, 246, 0.1); }
        button.danger { background: var(--danger); }

        /* Utilities */
        .hidden { display: none !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-2 { margin-top: 1rem; }
        
        /* Lobby Players */
        .player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 0.5rem;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .avatar { font-size: 2rem; background: rgba(255, 255, 255, 0.1); border-radius: 50%; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .kick-btn { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; width: 20px; height: 20px; border-radius: 50%; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; padding: 0; }

        /* Game UI */
        .timer { font-size: 2rem; font-weight: 700; color: var(--accent); margin-bottom: 1rem; }
        .hints-display { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
        .hint-box { background: rgba(255, 255, 255, 0.1); padding: 1rem; border-radius: 8px; font-weight: 600; }
        
        /* Leaderboard */
        .leaderboard-item { display: flex; flex-direction: column; margin-bottom: 1rem; text-align: right; }
        .score-bar-container { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1); border-radius: 6px; overflow: hidden; margin-top: 0.5rem; }
        .score-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 6px; transition: width 0.5s; }
        
        /* Toast Notifications */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 1rem 2rem; border-radius: 30px; font-weight: 600; opacity: 0; pointer-events: none; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="toast">تم النسخ بنجاح</div>

    <div id="app">
        <!-- Screen 1: Home -->
        <div id="screen-home" class="glass-panel screen">
            <h1>تلميحة</h1>
            <p>لعبة الذكاء وسرعة البديهة</p>
            <input type="text" id="input-name" placeholder="أدخل اسمك" maxlength="15">
            <button id="btn-create-room">إنشاء غرفة جديدة</button>
            <div style="margin: 1rem 0; color: var(--text-muted);">أو</div>
            <input type="text" id="input-room-code" placeholder="رقم الغرفة (4 أرقام)" maxlength="4">
            <button id="btn-join-room" class="secondary">الانضمام لغرفة</button>
        </div>

        <!-- Screen 2: Lobby -->
        <div id="screen-lobby" class="glass-panel screen hidden">
            <h2>غرفة الانتظار</h2>
            <div class="flex-between" style="margin-bottom: 1rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px;">
                <span style="font-size: 1.5rem; font-weight: bold; letter-spacing: 2px;" id="display-room-code">0000</span>
                <button id="btn-share-link" class="secondary" style="width: auto; margin: 0; padding: 0.5rem 1rem; font-size: 0.9rem;">مشاركة الرابط</button>
            </div>
            <div id="players-container" class="player-list"></div>
            
            <div id="admin-controls" class="hidden">
                <button id="btn-add-bot" class="secondary mt-2">إضافة بوت 🤖</button>
                <button id="btn-start-game" class="mt-2">بدء اللعبة</button>
            </div>
            <p id="waiting-msg" class="hidden mt-2">في انتظار المضيف لبدء اللعبة...</p>
        </div>

        <!-- Screen 3: Hints Phase -->
        <div id="screen-hints" class="glass-panel screen hidden">
            <h2 id="role-title">دورك: كتابة التلميحات</h2>
            <div class="timer" id="timer-hints">30</div>
            
            <!-- Hinter View -->
            <div id="view-hinter" class="hidden">
                <p>الكلمة المطلوبة: <strong id="target-word" style="color: var(--warning); font-size: 1.2rem;"></strong></p>
                <input type="text" id="hint-1" placeholder="التلميح الأول (كلمة واحدة)" maxlength="15">
                <input type="text" id="hint-2" placeholder="التلميح الثاني (كلمة واحدة)" maxlength="15">
                <input type="text" id="hint-3" placeholder="التلميح الثالث (كلمة واحدة)" maxlength="15">
                <button id="btn-submit-hints">إرسال التلميحات</button>
            </div>
            
            <!-- Guesser View -->
            <div id="view-waiting-hints" class="hidden">
                <div class="avatar" style="margin: 0 auto 1rem;">✍️</div>
                <p>اللاعب <strong id="current-hinter-name"></strong> يكتب التلميحات...</p>
            </div>
        </div>

        <!-- Screen 4: Guessing Phase -->
        <div id="screen-guess" class="glass-panel screen hidden">
            <h2>خمن الكلمة!</h2>
            <div class="timer" id="timer-guess">30</div>
            
            <div class="hints-display" id="display-hints"></div>
            
            <div id="view-guesser" class="hidden">
                <input type="text" id="input-guess" placeholder="اكتب تخمينك هنا..." maxlength="20">
                <button id="btn-submit-guess">إرسال التخمين</button>
                <p id="guess-feedback" style="margin-top: 1rem; font-weight: bold;"></p>
            </div>
            
            <div id="view-waiting-guesses" class="hidden">
                <p>اللاعبون يخمنون الكلمة: <strong style="color: var(--warning);" id="hinter-word-reveal"></strong></p>
            </div>
        </div>

        <!-- Screen 5: Results -->
        <div id="screen-results" class="glass-panel screen hidden">
            <h2>النتائج</h2>
            <p>الكلمة كانت: <strong id="result-word" style="color: var(--warning); font-size: 1.2rem;"></strong></p>
            
            <div id="leaderboard" style="margin-top: 2rem;"></div>
            
            <div id="admin-results-controls" class="hidden mt-2">
                <button id="btn-next-round">الجولة التالية</button>
                <button id="btn-reset-room" class="danger">إنهاء وحذف الغرفة</button>
            </div>
            <p id="waiting-next-round" class="hidden mt-2">في انتظار المضيف...</p>
        </div>
    </div>

    <!-- Firebase SDK (Modular via CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyB9mj2PkgVpX6M_BW1cUMaymY2VWA4pwqg",
            authDomain: "dogs-padel.firebaseapp.com",
            databaseURL: "https://dogs-padel-default-rtdb.firebaseio.com",
            projectId: "dogs-padel",
            storageBucket: "dogs-padel.firebasestorage.app",
            messagingSenderId: "989531067145",
            appId: "1:989531067145:web:2169954011b998bf8779d8",
            measurementId: "G-B36KB0RZXR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Game Constants & Globals ---
        const WORDS =["التفاحة", "السيارة", "البحر", "الجبل", "الشمس", "القمر", "الكتاب", "القلم", "الساعة", "الطائرة", "الأسد", "الحاسوب", "النظارة", "المفتاح"];
        const AVATARS =['🦊','🐼','🦁','🐸','🐵','🦄','🐙','🦉','🦖','🐢'];
        const PHASE_TIME = 30; // 30 seconds

        let myId = sessionStorage.getItem('playerId') || Math.random().toString(36).substring(2, 9);
        sessionStorage.setItem('playerId', myId);
        
        let roomId = null;
        let isHost = false;
        let roomData = null;
        let timerInterval = null;
        let botsProcessed = false;
        let currentPhaseEnd = 0;

        // --- Utility Functions ---
        const DOM = {
            show: (id) => document.getElementById(id).classList.remove('hidden'),
            hide: (id) => document.getElementById(id).classList.add('hidden'),
            val: (id) => document.getElementById(id).value.trim(),
            setVal: (id, val) => document.getElementById(id).value = val,
            html: (id, html) => document.getElementById(id).innerHTML = html,
            text: (id, text) => document.getElementById(id).innerText = text,
            on: (id, event, cb) => document.getElementById(id).addEventListener(event, cb)
        };

        const sanitize = (str) => str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        
        const showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            gsap.fromTo(toast, { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3 });
            setTimeout(() => gsap.to(toast, { opacity: 0, y: -20, duration: 0.3 }), 3000);
        };

        const switchScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            DOM.show(screenId);
            gsap.fromTo(`#${screenId}`, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" });
        };

        // Check URL for shared room code
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('room')) DOM.setVal('input-room-code', params.get('room'));
        };

        // --- Core Game Functions ---
        
        const joinGame = async (code, name, isCreating = false) => {
            if (!name) return showToast("الرجاء إدخال اسمك");
            name = sanitize(name);

            if (isCreating) {
                code = Math.floor(1000 + Math.random() * 9000).toString();
                isHost = true;
                await set(ref(db, `rooms/${code}`), {
                    state: 'lobby',
                    admin: myId,
                    players: { [myId]: { name, score: 0, isBot: false, avatar: AVATARS[Math.floor(Math.random() * AVATARS.length)] } }
                });
            } else {
                if (!code || code.length !== 4) return showToast("رقم الغرفة غير صحيح");
                const snap = await get(ref(db, `rooms/${code}`));
                if (!snap.exists()) return showToast("الغرفة غير موجودة");
                
                const players = snap.val().players || {};
                if (Object.values(players).some(p => p.name === name && p.id !== myId)) return showToast("هذا الاسم مستخدم في الغرفة");
                
                isHost = snap.val().admin === myId;
                await update(ref(db, `rooms/${code}/players/${myId}`), {
                    name, score: players[myId]?.score || 0, isBot: false, avatar: AVATARS[Math.floor(Math.random() * AVATARS.length)]
                });
            }

            roomId = code;
            setupPresence();
            listenToRoom();
            DOM.text('display-room-code', code);
            switchScreen('screen-lobby');
        };

        const setupPresence = () => {
            const playerRef = ref(db, `rooms/${roomId}/players/${myId}`);
            onDisconnect(playerRef).remove();
        };

        const listenToRoom = () => {
            onValue(ref(db, `rooms/${roomId}`), (snap) => {
                const data = snap.val();
                if (!data) {
                    showToast("تم إغلاق الغرفة");
                    setTimeout(() => window.location.reload(), 2000);
                    return;
                }
                
                // If I was kicked
                if (!data.players || !data.players[myId]) {
                    showToast("لقد تم طردك أو إزالتك من الغرفة");
                    setTimeout(() => window.location.reload(), 2000);
                    return;
                }

                roomData = data;
                isHost = roomData.admin === myId;
                updateUI();
            });
        };

        const updateUI = () => {
            // Lobby Update
            if (roomData.state === 'lobby') {
                switchScreen('screen-lobby');
                DOM.html('players-container', '');
                
                Object.entries(roomData.players).forEach(([pid, p]) => {
                    const kickBtn = (isHost && pid !== myId) ? `<button class="kick-btn" onclick="kickPlayer('${pid}')">✕</button>` : '';
                    const botBadge = p.isBot ? `<span style="font-size: 0.7rem; color: var(--accent);">بوت</span>` : '';
                    DOM.html('players-container', document.getElementById('players-container').innerHTML + `
                        <div class="player-card">
                            ${kickBtn}
                            <div class="avatar">${p.avatar}</div>
                            <span style="font-weight: 600;">${sanitize(p.name)}</span>
                            ${botBadge}
                        </div>
                    `);
                });

                if (isHost) {
                    DOM.show('admin-controls');
                    DOM.hide('waiting-msg');
                } else {
                    DOM.hide('admin-controls');
                    DOM.show('waiting-msg');
                }
            }

            // Hints Phase Update
            if (roomData.state === 'hints') {
                switchScreen('screen-hints');
                currentPhaseEnd = roomData.round.endTime;
                startTimer('timer-hints', handleHintTimerEnd);
                
                const isMyTurn = roomData.round.hinter === myId;
                DOM.text('role-title', isMyTurn ? 'دورك: اكتب 3 تلميحات' : 'مرحلة التلميحات');
                
                if (isMyTurn) {
                    DOM.show('view-hinter');
                    DOM.hide('view-waiting-hints');
                    DOM.text('target-word', roomData.round.word);
                    DOM.setVal('hint-1', ''); DOM.setVal('hint-2', ''); DOM.setVal('hint-3', '');
                } else {
                    DOM.hide('view-hinter');
                    DOM.show('view-waiting-hints');
                    DOM.text('current-hinter-name', roomData.players[roomData.round.hinter]?.name || 'لاعب');
                }
            }

            // Guessing Phase Update
            if (roomData.state === 'guessing') {
                switchScreen('screen-guess');
                currentPhaseEnd = roomData.round.endTime;
                startTimer('timer-guess', handleGuessTimerEnd);
                
                DOM.html('display-hints', roomData.round.hints.map(h => `<div class="hint-box">${sanitize(h)}</div>`).join(''));
                
                const isMyTurn = roomData.round.hinter === myId;
                DOM.text('guess-feedback', '');
                
                if (isMyTurn) {
                    DOM.hide('view-guesser');
                    DOM.show('view-waiting-guesses');
                    DOM.text('hinter-word-reveal', roomData.round.word);
                } else {
                    DOM.show('view-guesser');
