<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>تلميحة 💡</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tc" id="tc"></div>
<input type="file" id="fileInp" accept="image/*" style="position:fixed;top:-999px;left:-999px;width:1px;height:1px" onchange="onFilePick(event)">

<!-- CROP OVERLAY -->
<div id="crOv" class="hidden">
  <div style="color:#fff;font-family:Lexend,sans-serif;font-size:.9rem;font-weight:700;margin-bottom:14px">اضبط الصورة — اسحب للتحريك</div>
  <div id="crWrap"><canvas id="crCanvas" width="260" height="260"></canvas><div class="cr-ring"></div></div>
  <div style="margin-top:12px;color:rgba(255,255,255,.5);font-size:.72rem">🔍 تكبير</div>
  <input type="range" id="crZoom" min="1" max="4" step="0.02" value="1" style="width:240px;margin:8px 0;accent-color:#a855f7" oninput="crDraw()">
  <div style="display:flex;gap:10px;margin-top:8px">
    <button onclick="crCancel()" style="flex:1;padding:12px;background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:.9rem;font-weight:700">✕ إلغاء</button>
    <button onclick="crConfirm()" style="flex:1;padding:12px;background:#a855f7;color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:.9rem;font-weight:700">✓ تأكيد</button>
  </div>
</div>

<div id="app">

<!-- LOGIN -->
<div id="pLogin" class="pg">
  <div style="text-align:center;padding:36px 0 26px">
    <div style="font-size:3rem;margin-bottom:6px">💡</div>
    <div style="font-family:Lexend,sans-serif;font-size:2.2rem;font-weight:900;color:var(--purp)">تلميحة</div>
    <div style="font-size:.82rem;color:var(--t3);margin-top:4px">لعبة التضليل والذكاء</div>
  </div>
  <div class="card" id="lstep1">
    <div class="eyb">الخطوة 1 / 2</div>
    <div class="sht">اكتب اسمك <em>👋</em></div>
    <input class="inp" id="nameInp" type="text" placeholder="اسمك هنا..." maxlength="20" autocomplete="off" style="margin-bottom:12px" onkeypress="if(event.key==='Enter')goStep2()">
    <button class="bp" onclick="goStep2()">التالي →</button>
  </div>
  <div class="card hidden" id="lstep2">
    <div class="eyb">الخطوة 2 / 2</div>
    <div class="sht">أضف صورتك <em>📸</em></div>
    <div class="photo-area" onclick="document.getElementById('fileInp').click()" id="photoArea">
      <div id="photoPreview">
        <div style="font-size:2rem;margin-bottom:8px">📷</div>
        <div style="font-size:.86rem;font-weight:700;color:var(--t2)">اضغط لرفع صورة</div>
        <div style="font-size:.72rem;color:var(--t3);margin-top:4px">اختياري</div>
      </div>
    </div>
    <button class="bp" onclick="doLogin()" style="margin-top:12px">دخول →</button>
    <button class="bg" onclick="doLogin()" style="margin-top:8px;font-size:.82rem">تخطي ومتابعة</button>
    <button class="bg" onclick="goStep1()" style="margin-top:6px;font-size:.76rem">↩ رجوع</button>
  </div>
</div>

<!-- HOME -->
<div id="pHome" class="hidden">
  <div class="topb">
    <div class="tbtl">💡 تلميحة</div>
    <div id="topUser" style="display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:700;color:var(--t2)"></div>
  </div>
  <div class="pg">
    <div class="card">
      <div class="eyb">الرئيسية</div>
      <div class="sht">مرحباً <em id="homeName"></em> 👋</div>
      <div id="homeStatus" style="font-size:.8rem;color:var(--t3);margin-bottom:14px;padding:8px;background:var(--s2);border-radius:10px;text-align:center">جاري الاتصال...</div>
      <button class="bp" onclick="navLobby()" style="margin-bottom:8px">🎮 غرفة اللعب</button>
      <button class="bg" onclick="navStats()" style="margin-bottom:8px">📊 الإحصاءات</button>
      <button id="settBtn" class="bg" onclick="navSettings()" style="margin-bottom:8px;display:none">⚙️ الإعدادات</button>
      <button class="bg" onclick="doLogout()" style="font-size:.82rem">🚪 تسجيل خروج</button>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="pLobby" class="hidden">
  <div class="topb">
    <div class="tbtl">💡 تلميحة</div>
    <button onclick="navHome()" style="background:var(--s2);color:var(--t2);padding:6px 12px;font-size:.78rem;border-radius:10px;border:1px solid var(--bd)">↩ رجوع</button>
  </div>
  <div class="pg"><div id="lobbyContent"></div></div>
</div>

<!-- GAME -->
<div id="pGame" class="hidden">
  <div class="topb">
    <div class="tbtl" style="flex:1">💡 تلميحة</div>
    <div id="gameScore" style="font-size:.78rem;font-weight:700;color:var(--purp)"></div>
  </div>
  <div class="pg"><div id="gameContent"></div></div>
</div>

<!-- LEADERBOARD -->
<div id="pLeader" class="hidden">
  <div class="topb">
    <div class="tbtl">🏆 الترتيب</div>
    <div id="leaderInfo" style="font-size:.78rem;font-weight:700;color:var(--purp)"></div>
  </div>
  <div class="pg"><div id="leaderContent"></div></div>
</div>

<!-- STATS -->
<div id="pStats" class="hidden">
  <div class="topb">
    <div class="tbtl">📊 إحصاءات</div>
    <button onclick="navHome()" style="background:var(--s2);color:var(--t2);padding:6px 12px;font-size:.78rem;border-radius:10px;border:1px solid var(--bd)">↩ رجوع</button>
  </div>
  <div class="pg"><div id="statsContent"></div></div>
</div>

<!-- SETTINGS -->
<div id="pSettings" class="hidden">
  <div class="topb">
    <div class="tbtl">⚙️ الإعدادات</div>
    <button onclick="navHome()" style="background:var(--s2);color:var(--t2);padding:6px 12px;font-size:.78rem;border-radius:10px;border:1px solid var(--bd)">↩ رجوع</button>
  </div>
  <div class="pg"><div id="settingsContent"></div></div>
</div>

</div><!-- #app -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
